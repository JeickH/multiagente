version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multiagente_db}
      POSTGRES_USER: ${POSTGRES_USER:-multiagente_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multiagente_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-multiagente_db}
      POSTGRES_USER: ${POSTGRES_USER:-multiagente_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multiagente_pass}
      SECRET_KEY: ${SECRET_KEY:-cambia-este-secreto-en-produccion}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      # Sprint 7: clave Fernet para cifrar credenciales Meta per-tenant.
      # Se lee del .env de la raíz. El backend falla al arranque si falta.
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY requerida. Genera con python backend/scripts/gen_encryption_key.py}
      APP_ENV: ${APP_ENV:-development}
      META_API_VERSION: ${META_API_VERSION:-v22.0}
      # Sprint 13 #162: envío de campañas (sandbox por default en local).
      META_SANDBOX: ${META_SANDBOX:-1}
      META_RATE_LIMIT_RPS: ${META_RATE_LIMIT_RPS:-10}
      CAMPAIGN_SENDER_BATCH: ${CAMPAIGN_SENDER_BATCH:-200}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      WATI_API_ENDPOINT: ${WATI_API_ENDPOINT:-}
      WATI_BEARER_TOKEN: ${WATI_BEARER_TOKEN:-}
      # Sprint 19: motor de bots LLM vía AWS Bedrock. En local las credenciales
      # AWS se leen del .env raíz; en ECS las provee el IAM task role.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BEDROCK_REGION: ${BEDROCK_REGION:-sa-east-1}
      LLM_MODEL_ID: ${LLM_MODEL_ID:-global.anthropic.claude-haiku-4-5-20251001-v1:0}
      # #263: Twilio (valores del .env raíz git-ignorado; en ECS van por SSM).
      TWILIO_SANDBOX: ${TWILIO_SANDBOX:-1}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_WEBHOOK_BASE_URL: ${TWILIO_WEBHOOK_BASE_URL:-}
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Next.js bakea el rewrite destination en build; el host debe ser el
        # service name del compose (backend), no localhost.
        BACKEND_URL: http://backend:8000
    restart: always
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
