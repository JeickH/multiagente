version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multiagente_db}
      POSTGRES_USER: ${POSTGRES_USER:-multiagente_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multiagente_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-multiagente_db}
      POSTGRES_USER: ${POSTGRES_USER:-multiagente_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multiagente_pass}
      SECRET_KEY: ${SECRET_KEY:-cambia-este-secreto-en-produccion}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      WATI_API_ENDPOINT: ${WATI_API_ENDPOINT:-}
      WATI_BEARER_TOKEN: ${WATI_BEARER_TOKEN:-}
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
